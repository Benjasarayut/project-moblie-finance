<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6b35b8">
<title>ThaiBank - สมัครสมาชิก</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%236b35b8' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='Arial'>฿</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.wrap { max-width: 400px; width: 100%; }
.phone {
  background: #1a1a1a;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  border: 0.5px solid #404040;
  animation: slideUp 0.6s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.container {
  padding: 32px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.logo-area {
  text-align: center;
  margin-bottom: 24px;
}
.logo {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(52, 211, 153, 0.2) 100%);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 12px;
  border: 0.5px solid #404040;
  color: #34d399;
}
.logo-title {
  font-size: 24px;
  color: #ffffff;
  font-weight: 600;
  margin-bottom: 4px;
}
.logo-subtitle {
  font-size: 12px;
  color: #b0b0b0;
}
.form-section {
  flex: 1;
}
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 12px;
  color: #b0b0b0;
  font-weight: 500;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input, .field select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #404040;
  border-radius: 10px;
  background: #272727;
  font-size: 14px;
  color: #ffffff;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  font-family: inherit;
}
.field input:focus, .field select:focus {
  border-color: #34d399;
  background: #1a1a1a;
  box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
}
.field input::placeholder {
  color: #666;
}
.pwd-strength {
  margin-top: 6px;
  font-size: 11px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.strength-bar {
  flex: 1;
  height: 3px;
  background: #404040;
  border-radius: 2px;
  overflow: hidden;
}
.strength-fill {
  height: 100%;
  width: 0%;
  background: #ff6b6b;
  border-radius: 2px;
  transition: width 0.3s, background 0.3s;
}
.strength-fill.weak { width: 33%; background: #ff6b6b; }
.strength-fill.medium { width: 66%; background: #fbbf24; }
.strength-fill.strong { width: 100%; background: #4ade80; }
.strength-text {
  color: #b0b0b0;
  font-size: 10px;
}
.check-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  padding: 10px;
  background: #272727;
  border-radius: 8px;
  font-size: 12px;
  color: #b0b0b0;
  border: 0.5px solid #404040;
}
.check-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: #10b981;
}
.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid #404040;
}
.btn-main {
  background: #10b981;
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn-main:hover {
  background: #34d399;
}
.btn-main:active {
  transform: scale(0.98);
}
.btn-login {
  background: transparent;
  color: #34d399;
  border: 1.5px solid #404040;
  border-radius: 10px;
  padding: 13px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-login:hover {
  border-color: #34d399;
  background: rgba(52, 211, 153, 0.1);
}
.terms-text {
  font-size: 10px;
  color: #666;
  text-align: center;
  margin-top: 12px;
  line-height: 1.4;
}
.terms-text a {
  color: #34d399;
  text-decoration: none;
  font-weight: 500;
}
.error {
  display: none;
  background: rgba(248, 113, 113, 0.1);
  color: #f87171;
  border-left: 3px solid #f87171;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
  border: 0.5px solid rgba(248, 113, 113, 0.3);
}
.error.show {
  display: block;
}
.success {
  display: none;
  background: rgba(74, 222, 128, 0.1);
  color: #4ade80;
  border-left: 3px solid #4ade80;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
  border: 0.5px solid rgba(74, 222, 128, 0.3);
}
.success.show {
  display: block;
}
.loading {
  display: none;
  text-align: center;
  padding: 12px;
  color: #b0b0b0;
  font-size: 12px;
}
.loader {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #404040;
  border-top-color: #34d399;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="wrap">
<div class="phone">
<div class="container">

<div class="logo-area">
  <div class="logo">฿</div>
  <div class="logo-title">ThaiBank</div>
  <div class="logo-subtitle">สมัครสมาชิก</div>
</div>

<div class="form-section">
  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>
  
  <form id="registerForm" onsubmit="handleRegister(event)">
    
    <div class="field">
      <label for="fullName">ชื่อ-นามสกุล</label>
      <input type="text" id="fullName" placeholder="เช่น สมชาย วงศ์ดี" required>
    </div>

    <div class="field">
      <label for="phone">เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" placeholder="0812345678" pattern="[0-9]{10}" required>
    </div>

    <div class="field">
      <label for="idNumber">เลขบัตรประชาชน</label>
      <input type="text" id="idNumber" placeholder="13 หลัก เช่น 1234567890123" pattern="[0-9]{13}" required>
    </div>

    <div class="field">
      <label for="address">ที่อยู่</label>
      <input type="text" id="address" placeholder="บ้านเลขที่ ถนน ตำบล อำเภอ จังหวัด" required>
    </div>

    <div class="field">
      <label for="occupation">อาชีพ</label>
      <select id="occupation" required>
        <option value="">เลือกอาชีพ</option>
        <option value="พนักงานบริษัท">พนักงานบริษัท</option>
        <option value="ค้าขาย">ค้าขาย</option>
        <option value="รับจ้าง">รับจ้าง</option>
        <option value="นักเรียน/นักศึกษา">นักเรียน/นักศึกษา</option>
        <option value="ข้าราชการ">ข้าราชการ</option>
        <option value="อาชีพอิสระ">อาชีพอิสระ</option>
        <option value="อื่นๆ">อื่นๆ</option>
      </select>
    </div>

    <div class="field">
      <label for="monthlyIncome">รายได้ต่อเดือน (บาท)</label>
      <select id="monthlyIncome" required>
        <option value="">เลือกรายได้</option>
        <option value="ต่ำกว่า 15,000">ต่ำกว่า 15,000</option>
        <option value="15,000 - 30,000">15,000 - 30,000</option>
        <option value="30,000 - 50,000">30,000 - 50,000</option>
        <option value="50,000 - 100,000">50,000 - 100,000</option>
        <option value="มากกว่า 100,000">มากกว่า 100,000</option>
      </select>
    </div>

    <div class="field">
      <label for="idDocument">รูปถ่ายบัตรประชาชน</label>
      <input type="file" id="idDocument" accept="image/*" required>
      <small style="color: #666; font-size: 11px;">อัปโหลดรูปถ่ายบัตรประชาชนเพื่อยืนยันตัวตน</small>
    </div>

    <div class="field">
      <label for="securityQuestion">คำถามความปลอดภัย</label>
      <select id="securityQuestion" required>
        <option value="">เลือกคำถาม</option>
        <option value="สัตว์เลี้ยงตัวแรกของคุณชื่ออะไร?">สัตว์เลี้ยงตัวแรกของคุณชื่ออะไร?</option>
        <option value="โรงเรียนประถมของคุณชื่ออะไร?">โรงเรียนประถมของคุณชื่ออะไร?</option>
        <option value="เมืองเกิดของคุณคือ?">เมืองเกิดของคุณคือ?</option>
        <option value="เพื่อนสนิทสมัยเด็กชื่ออะไร?">เพื่อนสนิทสมัยเด็กชื่ออะไร?</option>
      </select>
    </div>

    <div class="field">
      <label for="securityAnswer">คำตอบ</label>
      <input type="text" id="securityAnswer" placeholder="คำตอบของคุณ" required>
    </div>

    <div class="field">
      <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
      <input type="password" id="confirmPassword" placeholder="กรุณาป้อนรหัสผ่านอีกครั้ง" required>
    </div>

    <div class="check-row">
      <input type="checkbox" id="agreeTerms" required>
      <label for="agreeTerms" style="margin:0; cursor:pointer;">
        ฉันยอมรับ <a href="#" onclick="alert('เงื่อนไขการใช้บริการคำอธิบายสาธารณะ'); return false;" style="color:#6b35b8; text-decoration:none;">เงื่อนไขการใช้บริการ</a>
      </label>
    </div>

  </form>

  <div class="loading" id="loading">
    <div><span class="loader"></span>กำลังสมัครสมาชิก...</div>
  </div>
</div>

<div class="actions">
  <button class="btn-main" onclick="handleRegister()">สมัครสมาชิก</button>
  <button class="btn-login" onclick="window.location.href='login.html'">เข้าสู่ระบบแล้ว</button>
</div>

<div class="terms-text">
  โดยการสมัครสมาชิก คุณยอมรับ<br>
  <a href="#" onclick="alert('นโยบายความเป็นส่วนตัว'); return false;">นโยบายความเป็นส่วนตัว</a> และ
  <a href="#" onclick="alert('เงื่อนไขการใช้บริการ'); return false;">เงื่อนไขการใช้</a>
</div>

</div>
</div>
</div>


<script>
function updatePasswordStrength() {
  const pwd = document.getElementById('password').value;
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');

  let strength = 0;
  if (pwd.length >= 8) strength++;
  if (/[a-z]/.test(pwd)) strength++;
  if (/[A-Z]/.test(pwd)) strength++;
  if (/[0-9]/.test(pwd)) strength++;
  if (/[^a-zA-Z0-9]/.test(pwd)) strength++;

  bar.className = 'strength-fill';

  if (strength <= 2) {
    bar.classList.add('weak');
    text.textContent = 'อ่อน';
  } else if (strength <= 3) {
    bar.classList.add('medium');
    text.textContent = 'ปานกลาง';
  } else {
    bar.classList.add('strong');
    text.textContent = 'แข็งแรง';
  }
}

async function handleRegister(e) {
  if (e) e.preventDefault();

  const fullName = document.getElementById('fullName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const agreeTerms = document.getElementById('agreeTerms').checked;

  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');

  errorMsg.classList.remove('show');
  successMsg.classList.remove('show');

  if (!fullName || !phone || !email || !password) {
    return showError('กรุณากรอกข้อมูลให้ครบ');
  }

  if (password.length < 8) {
    return showError('รหัสผ่านต้องมีอย่างน้อย 8 ตัว');
  }

  if (password !== confirmPassword) {
    return showError('รหัสผ่านไม่ตรงกัน');
  }

  if (!agreeTerms) {
    return showError('กรุณายอมรับเงื่อนไข');
  }

  document.getElementById('loading').style.display = 'block';

  try {
    const res = await fetch('http://localhost:3000/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName, phone, email, password })
    });

    const data = await res.json();

    document.getElementById('loading').style.display = 'none';

    if (res.ok) {
      showSuccess('สมัครสำเร็จ!');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1200);
    } else {
      showError(data.message || 'สมัครไม่สำเร็จ');
    }

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    showError('เชื่อมต่อ server ไม่ได้');
    console.error(err);
  }
}

function showError(msg) {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}

function showSuccess(msg) {
  const successMsg = document.getElementById('successMsg');
  successMsg.textContent = msg;
  successMsg.classList.add('show');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('registerForm')
    .addEventListener('submit', handleRegister);
});
</script>
</body>
</html>
