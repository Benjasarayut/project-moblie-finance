<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6b35b8">
<title>ThaiBank - สมัครสมาชิก</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%236b35b8' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='Arial'>฿</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, #6b35b8 0%, #4a2080 100%);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.wrap { max-width: 400px; width: 100%; }
.phone {
  background: #ffffff;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(107, 53, 184, 0.3);
  animation: slideUp 0.6s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.container {
  padding: 32px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.logo-area {
  text-align: center;
  margin-bottom: 24px;
}
.logo {
  width: 64px;
  height: 64px;
  background: #6b35b8;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 12px;
}
.logo-title {
  font-size: 24px;
  color: #111;
  font-weight: 600;
  margin-bottom: 4px;
}
.logo-subtitle {
  font-size: 12px;
  color: #999;
}
.form-section {
  flex: 1;
}
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 12px;
  color: #666;
  font-weight: 500;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input, .field select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #e5e5e5;
  border-radius: 10px;
  background: #f8f8f8;
  font-size: 14px;
  color: #111;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  font-family: inherit;
}
.field input:focus, .field select:focus {
  border-color: #6b35b8;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(107, 53, 184, 0.08);
}
.field input::placeholder {
  color: #999;
}
.pwd-strength {
  margin-top: 6px;
  font-size: 11px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.strength-bar {
  flex: 1;
  height: 3px;
  background: #e5e5e5;
  border-radius: 2px;
  overflow: hidden;
}
.strength-fill {
  height: 100%;
  width: 0%;
  background: #ff6b6b;
  border-radius: 2px;
  transition: width 0.3s, background 0.3s;
}
.strength-fill.weak { width: 33%; background: #ff6b6b; }
.strength-fill.medium { width: 66%; background: #fbbf24; }
.strength-fill.strong { width: 100%; background: #4ade80; }
.strength-text {
  color: #666;
  font-size: 10px;
}
.check-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  padding: 10px;
  background: #f8f8f8;
  border-radius: 8px;
  font-size: 12px;
  color: #666;
}
.check-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}
.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid #e5e5e5;
}
.btn-main {
  background: #6b35b8;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn-main:hover {
  background: #4a2080;
}
.btn-main:active {
  transform: scale(0.98);
}
.btn-login {
  background: transparent;
  color: #6b35b8;
  border: 1.5px solid #e5e5e5;
  border-radius: 10px;
  padding: 13px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-login:hover {
  border-color: #6b35b8;
  background: #f5f3ff;
}
.terms-text {
  font-size: 10px;
  color: #999;
  text-align: center;
  margin-top: 12px;
  line-height: 1.4;
}
.terms-text a {
  color: #6b35b8;
  text-decoration: none;
  font-weight: 500;
}
.error {
  display: none;
  background: #fee2e2;
  color: #991b1b;
  border-left: 3px solid #f87171;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
}
.error.show {
  display: block;
}
.success {
  display: none;
  background: #dcfce7;
  color: #166534;
  border-left: 3px solid #86efac;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
}
.success.show {
  display: block;
}
.loading {
  display: none;
  text-align: center;
  padding: 12px;
  color: #666;
  font-size: 12px;
}
.loader {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #e5e5e5;
  border-top-color: #6b35b8;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="wrap">
<div class="phone">
<div class="container">

<div class="logo-area">
  <div class="logo">฿</div>
  <div class="logo-title">ThaiBank</div>
  <div class="logo-subtitle">สมัครสมาชิก</div>
</div>

<div class="form-section">
  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>
  
  <form id="registerForm" onsubmit="handleRegister(event)">
    
    <div class="field">
      <label for="fullName">ชื่อ-นามสกุล</label>
      <input type="text" id="fullName" placeholder="เช่น สมชาย วงศ์ดี" required>
    </div>

    <div class="field">
      <label for="phone">เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" placeholder="081-234-5678" pattern="[0-9]+-[0-9]+" required>
    </div>

    <div class="field">
      <label for="email">อีเมล</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>

    <div class="field">
      <label for="password">รหัสผ่าน</label>
      <input type="password" id="password" placeholder="ตัวพิมพ์ใหญ่ + ตัวพิมพ์เล็ก + ตัวเลข" oninput="updatePasswordStrength()" required>
      <div class="pwd-strength">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthBar"></div>
        </div>
        <span class="strength-text" id="strengthText">อ่อน</span>
      </div>
    </div>

    <div class="field">
      <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
      <input type="password" id="confirmPassword" placeholder="กรุณาป้อนรหัสผ่านอีกครั้ง" required>
    </div>

    <div class="check-row">
      <input type="checkbox" id="agreeTerms" required>
      <label for="agreeTerms" style="margin:0; cursor:pointer;">
        ฉันยอมรับ <a href="#" onclick="alert('เงื่อนไขการใช้บริการคำอธิบายสาธารณะ'); return false;" style="color:#6b35b8; text-decoration:none;">เงื่อนไขการใช้บริการ</a>
      </label>
    </div>

  </form>

  <div class="loading" id="loading">
    <div><span class="loader"></span>กำลังสมัครสมาชิก...</div>
  </div>
</div>

<div class="actions">
  <button class="btn-main" onclick="handleRegister()">สมัครสมาชิก</button>
  <button class="btn-login" onclick="window.location.href='login.html'">เข้าสู่ระบบแล้ว</button>
</div>

<div class="terms-text">
  โดยการสมัครสมาชิก คุณยอมรับ<br>
  <a href="#" onclick="alert('นโยบายความเป็นส่วนตัว'); return false;">นโยบายความเป็นส่วนตัว</a> และ
  <a href="#" onclick="alert('เงื่อนไขการใช้บริการ'); return false;">เงื่อนไขการใช้</a>
</div>

</div>
</div>
</div>

<script src="../src/js/db.js"></script>
<script>
function updatePasswordStrength() {
  const pwd = document.getElementById('password').value;
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  
  let strength = 0;
  if (pwd.length >= 8) strength++;
  if (/[a-z]/.test(pwd)) strength++;
  if (/[A-Z]/.test(pwd)) strength++;
  if (/[0-9]/.test(pwd)) strength++;
  if (/[^a-zA-Z0-9]/.test(pwd)) strength++;
  
  bar.className = 'strength-fill';
  if (strength <= 2) {
    bar.classList.add('weak');
    text.textContent = 'อ่อน';
  } else if (strength <= 3) {
    bar.classList.add('medium');
    text.textContent = 'ปานกลาง';
  } else {
    bar.classList.add('strong');
    text.textContent = 'แข็งแรง';
  }
}

function handleRegister(e) {
  if (e) e.preventDefault();
  
  const fullName = document.getElementById('fullName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const agreeTerms = document.getElementById('agreeTerms').checked;
  
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  
  // Reset messages
  errorMsg.classList.remove('show');
  successMsg.classList.remove('show');
  
  // Validation
  if (!fullName || !phone || !email || !password) {
    showError('กรุณากรอกข้อมูลให้ครบถ้วน');
    return;
  }
  
  if (password.length < 8) {
    showError('รหัสผ่านต้องมีอักษรอย่างน้อย 8 ตัว');
    return;
  }
  
  if (password !== confirmPassword) {
    showError('รหัสผ่านไม่ตรงกัน');
    return;
  }
  
  if (!agreeTerms) {
    showError('กรุณายอมรับเงื่อนไขการใช้บริการ');
    return;
  }
  
  // Check if user already exists
  if (typeof DB !== 'undefined') {
    const existing = DB.findUser(phone);
    if (existing) {
      showError('เบอร์โทรศัพท์นี้ได้รับการสมัครสมาชิกแล้ว');
      return;
    }
    
    // Register user
    document.getElementById('loading').style.display = 'block';
    
    setTimeout(() => {
      const result = DB.registerUser(fullName, phone, email, password);
      document.getElementById('loading').style.display = 'none';
      
      if (result.success) {
        showSuccess('สมัครสมาชิกสำเร็จ! ไปยังหน้าเข้าสู่ระบบ...');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } else {
        showError(result.message || 'เกิดข้อผิดพลาด');
      }
    }, 800);
  } else {
    showError('เกิดข้อผิดพลาด: โหลด Database ไม่สำเร็จ');
  }
}

function showError(msg) {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
  errorMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function showSuccess(msg) {
  const successMsg = document.getElementById('successMsg');
  successMsg.textContent = msg;
  successMsg.classList.add('show');
}

// Handle Enter key
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleRegister();
  });
});
</script>
</body>
</html>
