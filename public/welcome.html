<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6b35b8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ThaiBank">
<title>ThaiBank — Mobile Banking</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%236b35b8' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='Arial'>฿</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%236b35b8' width='180' height='180' rx='40'/><text x='90' y='90' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='Arial'>฿</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }
body {
  background: linear-gradient(135deg, #6b35b8 0%, #4a2080 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.wrap { 
  max-width: 400px; 
  width: 100%;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
.phone {
  background: linear-gradient(180deg, #ffffff 0%, #f5f3ff 100%);
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(107, 53, 184, 0.4);
  animation: slideUp 0.8s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}
.container {
  padding: 40px 24px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  min-height: 100vh;
  width: 100%;
}
.logo-section {
  margin-bottom: 32px;
  animation: float 3s ease-in-out infinite;
}
.logo {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #6b35b8 0%, #8b5cf6 100%);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  margin: 0 auto 16px;
  box-shadow: 0 10px 30px rgba(107, 53, 184, 0.3);
}
.title {
  font-size: 28px;
  color: #1a0a2e;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.tagline {
  font-size: 13px;
  color: #666;
  margin-bottom: 24px;
  line-height: 1.5;
}
.features {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 36px;
  padding: 16px;
  background: rgba(107, 53, 184, 0.05);
  border-radius: 14px;
  width: 100%;
}
.feature {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: #333;
}
.feature-icon {
  width: 28px;
  height: 28px;
  background: #ede9fe;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  margin-top: auto;
}
.btn {
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
  -webkit-appearance: none;
  -webkit-border-radius: 12px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-register {
  background: linear-gradient(135deg, #6b35b8 0%, #5a2a9f 100%);
  color: #fff;
  box-shadow: 0 8px 20px rgba(107, 53, 184, 0.4);
}
.btn-register:active {
  transform: scale(0.98);
  box-shadow: 0 4px 12px rgba(107, 53, 184, 0.3);
}
.btn-login {
  background: transparent;
  color: #6b35b8;
  border: 2px solid #6b35b8;
  font-weight: 600;
}
.btn-login:active {
  background: #f5f3ff;
  transform: scale(0.98);
}
.btn-install {
  background: #f5f3ff;
  color: #6b35b8;
  border: 1.5px solid #d8cef8;
  font-weight: 500;
  font-size: 13px;
  display: none;
}
.btn-install.show {
  display: flex;
}
.btn-install:active {
  background: #ede9fe;
}
.divider {
  margin: 24px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: #999;
  width: 100%;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e5e5e5;
}
.bottom-text {
  font-size: 10px;
  color: #999;
  margin-top: 16px;
  text-align: center;
  line-height: 1.5;
}
.bottom-text a {
  color: #6b35b8;
  text-decoration: none;
  font-weight: 500;
}
.mobile-badge {
  display: inline-block;
  background: #dcfce7;
  color: #166534;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  margin-top: 8px;
}
@media (max-width: 480px) {
  .container { padding: 32px 16px 48px; }
  .logo { width: 72px; height: 72px; font-size: 40px; }
  .title { font-size: 24px; }
  .features { gap: 8px; padding: 12px; }
  .feature { font-size: 11px; }
}
</style>
</head>
<body>
<div class="wrap">
<div class="phone">
<div class="container">

<div class="logo-section">
  <div class="logo">฿</div>
  <div class="title">ThaiBank</div>
  <div class="tagline">ธนาคารดิจิทัลของไทย</div>
</div>

<div class="features">
  <div class="feature">
    <div class="feature-icon">💳</div>
    <div>ถ่ายโอนเงิน โอนจ่าย ทั้งหมดในแอพเดียว</div>
  </div>
  <div class="feature">
    <div class="feature-icon">🔒</div>
    <div>รักษาความปลอดภัย ด้วย Biometric 2FA</div>
  </div>
  <div class="feature">
    <div class="feature-icon">⚡</div>
    <div>ทำธุรการได้ทุกเวลา 24/7 ไม่มีวันหยุด</div>
  </div>
  <div class="feature">
    <div class="feature-icon">🤖</div>
    <div>AI ช่วยวางแผนการเงินและการลงทุน</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-install" id="installBtn" onclick="installApp()">
    📥 ลงแอปบนมือถือ
  </button>
  
  <button class="btn btn-register" onclick="window.location.href='register.html'">
    สมัครสมาชิก
  </button>
  
  <div class="divider">หรือ</div>
  
  <button class="btn btn-login" onclick="window.location.href='login.html'">
    เข้าสู่ระบบ
  </button>
</div>

<div class="bottom-text">
  โดยการใช้งาน ThaiBank คุณยอมรับ<br>
  <a href="#" onclick="alert('เงื่อนไขการใช้บริการ'); return false;">เงื่อนไขการใช้บริการ</a> และ
  <a href="#" onclick="alert('นโยบายความเป็นส่วนตัว'); return false;">นโยบายความเป็นส่วนตัว</a>
</div>

</div>
</div>
</div>

<script>
// PWA Install Support
let deferredPrompt;
let isInstallable = false;

// Detect if app is already installed
function isAppInstalled() {
  // Check if running as standalone PWA
  if (navigator.standalone === true) return true;
  if (window.matchMedia('(display-mode: standalone)').matches) return true;
  if (window.matchMedia('(display-mode: fullscreen)').matches) return true;
  return false;
}

// Handle beforeinstallprompt event
window.addEventListener('beforeinstallprompt', (e) => {
  console.log('✓ beforeinstallprompt event triggered');
  e.preventDefault();
  deferredPrompt = e;
  isInstallable = true;
  showInstallButton();
});

// Handle app installed
window.addEventListener('appinstalled', () => {
  console.log('✓ App installed successfully');
  deferredPrompt = null;
  hideInstallButton();
});

function showInstallButton() {
  const btn = document.getElementById('installBtn');
  if (btn && !isAppInstalled()) {
    btn.classList.add('show');
  }
}

function hideInstallButton() {
  const btn = document.getElementById('installBtn');
  if (btn) {
    btn.classList.remove('show');
  }
}

async function installApp() {
  if (!deferredPrompt) {
    alert('ไม่สามารถติดตั้งได้ในขณะนี้');
    return;
  }
  
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  
  if (outcome === 'accepted') {
    console.log('✓ App installation accepted');
  } else {
    console.log('✗ App installation declined');
  }
  
  deferredPrompt = null;
  hideInstallButton();
}

// Check on page load
window.addEventListener('load', () => {
  // Check if already installed
  if (isAppInstalled()) {
    hideInstallButton();
    console.log('📱 Running as installed app');
  } else if (isInstallable) {
    showInstallButton();
    console.log('📦 App is installable');
  }
  
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../src/js/service-worker.js?v=20260405')
      .then(r => console.log('✓ Service Worker registered'))
      .catch(e => console.log('✗ Service Worker failed:', e));
  }
});
</script>

</body>
</html>
