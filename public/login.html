<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6b35b8">
<meta name="description" content="แอปจัดการการเงินส่วนบุคคลพร้อม AI ที่ช่วยคำนวณภาษีและการลงทุน">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ThaiBank">
<title>ThaiBank - ล็อกอิน</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%236b35b8' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='Arial'>฿</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%236b35b8' width='180' height='180' rx='40'/><text x='90' y='90' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='Arial'>฿</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 20px;
}

:root {
  --p6: #10b981;
  --p5: #34d399;
  --p2: #1f4435;
  --p1: #ecfdf5;
  --r1: #f87171;
  --g1: #4ade80;
  --border: #404040;
  --text: #ffffff;
  --text2: #b0b0b0;
}

.login-container {
  background: #1a1a1a;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
  width: 100%;
  max-width: 420px;
  padding: 32px 24px;
  border: 0.5px solid var(--border);
}

.logo-section {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(52, 211, 153, 0.2) 100%);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 32px;
  font-weight: bold;
  color: var(--p5);
  border: 0.5px solid var(--border);
}

.title {
  font-size: 24px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  color: var(--text);
  background: #272727;
  outline: none;
  transition: all .15s;
}

.form-input:focus {
  border-color: var(--p5);
  box-shadow: 0 0 0 3px rgba(52, 211, 153, .15);
}

.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--p6);
  color: #000;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  min-height: 48px;
}

.btn-login:hover {
  background: var(--p5);
}

.btn-login:active {
  opacity: .8;
}

.btn-login:disabled {
  background: #404040;
  cursor: not-allowed;
  color: #666;
}

.error-message {
  background: rgba(248, 113, 113, .1);
  color: var(--r1);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
  border: 0.5px solid rgba(248, 113, 113, .3);
}

.error-message.show {
  display: block;
}

.footer-text {
  font-size: 11px;
  color: var(--text2);
  text-align: center;
  margin-top: 20px;
}

.footer-text a {
  color: var(--p5);
  text-decoration: none;
  font-weight: 500;
}

@media (max-height: 600px) {
  .login-container { padding: 24px 16px; }
  .logo-section { margin-bottom: 16px; }
  .title { font-size: 20px; }
}
</style>
</head>
<body>

<div class="login-container">
  <!-- Logo & Title -->
  <div class="logo-section">
    <div class="logo-icon">฿</div>
    <div class="title">ThaiBank</div>
    <div class="subtitle">เข้าสู่บัญชีการเงินของคุณ</div>
  </div>

  <!-- Error Message -->
  <div class="error-message" id="errorMessage"></div>

  <!-- PASSWORD METHOD -->
  <div class="form-group">
    <label class="form-label">🔐 รหัสผ่าน</label>
    <input type="password" class="form-input" id="password" placeholder="กรอกรหัสผ่าน">
  </div>
  <button class="btn-login" onclick="loginWithPassword()">ล็อกอิน</button>

  <!-- DIVIDER -->
  <div style="text-align: center; color: var(--text2); font-size: 12px; margin: 24px 0; position: relative;">
    <div style="border-top: 1px solid var(--border); margin-bottom: 12px;"></div>
    หรือ
  </div>

  <!-- FACE RECOGNITION -->
  <div class="form-group">
    <label class="form-label">😊 แสกนหน้า</label>
    <button class="btn-login" onclick="loginWithFace()">แสกนหน้า</button>
  </div>

  <!-- FINGERPRINT -->
  <div class="form-group">
    <label class="form-label">👆 ลายนิ้วมือ</label>
    <button class="btn-login" onclick="loginWithFingerprint()">สแกนลายนิ้ว</button>
  </div>

  <!-- Footer -->
  <div class="footer-text">
    ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
  </div>
</div>

<script>
// ========== PASSWORD LOGIN ==========
async function loginWithPassword() {
  const password = document.getElementById('password').value;

  if (!password) {
    showError('กรุณากรอกรหัสผ่าน');
    return;
  }

  console.log('🔍 Attempting login with password...');

  // Simple password check for demo
  const validPasswords = ['password123', '123456', '1234'];
  
  if (validPasswords.includes(password)) {
    console.log('✓ Login successful, redirecting...');

    // Store mock user data
    localStorage.setItem('token', 'demo-token-' + Date.now());
    localStorage.setItem('user', JSON.stringify({
      id: 'USR001',
      phone: '081-234-5678',
      name: 'สมชาย',
      email: 'somchai@example.com'
    }));

    console.log('✓ Token stored, redirecting to index.html');

    // Small delay to ensure localStorage is set
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 100);
  } else {
    console.log('❌ Login failed: invalid password');
    showError('รหัสผ่านไม่ถูกต้อง');
  }
}

// ========== FACE RECOGNITION ==========
function loginWithFace() {
  alert('⏳ ฟีเจอร์แสกนหน้านั้นใช้ได้เร็ว ๆ นี้');
  // WebAuthn/FaceAPI integration will go here
}

// ========== FINGERPRINT ==========
function loginWithFingerprint() {
  if (window.PublicKeyCredential && window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
    window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(available => {
      if (available) {
        alert('⏳ ฟีเจอร์สแกนลายนิ้วนั้นใช้ได้เร็ว ๆ นี้');
      } else {
        showError('อุปกรณ์นี้ไม่รองรับการสแกนลายนิ้ว');
      }
    });
  } else {
    showError('เบราว์เซอร์นี้ไม่รองรับการสแกนลายนิ้ว');
  }
}

// ========== HELPER FUNCTIONS ==========
function showError(message) {
  const errorEl = document.getElementById('errorMessage');
  errorEl.textContent = message;
  errorEl.classList.add('show');
  setTimeout(() => errorEl.classList.remove('show'), 4000);
}

// ========== SERVICE WORKER & PWA SETUP ==========
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../src/js/service-worker.js', { scope: '/public/' })
    .then(registration => {
      console.log('✓ Service Worker registered:', registration.scope);
    })
    .catch(error => {
      console.error('❌ Service Worker registration failed:', error);
    });
}

// ========== CHECK IF ALREADY LOGGED IN ==========
document.addEventListener('DOMContentLoaded', function() {
  const token = localStorage.getItem('token');
  if (token) {
    // User is already logged in, redirect to main app
    window.location.href = 'index.html';
  }
});
</script>

</body>
</html>
